<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A small calculator used to test Auto Dev workflows." />
    <link rel="stylesheet" href="./styles.css" />
    <title>Calculator</title>
  </head>
  <body>
    <main class="calculator" aria-labelledby="calculator-title">
      <h1 id="calculator-title">Calculator</h1>
      <p>Small and intentionally simple for testing issue-driven development.</p>
      <output id="display" aria-live="polite">0</output>
      <div class="inputs">
        <label>First number<input id="left" type="number" value="12" /></label>
        <label>Second number<input id="right" type="number" value="3" /></label>
      </div>
      <div class="operations" aria-label="Calculator operations">
        <button data-operation="add">Add</button>
        <button data-operation="subtract">Subtract</button>
        <button data-operation="multiply">Multiply</button>
        <button data-operation="divide">Divide</button>
        <button data-operation="power">Power</button>
        <button data-operation="remainder">Remainder</button>
        <button data-operation="average">Average</button>
      </div>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
